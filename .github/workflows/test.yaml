name: EPG Update

on:
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
           node-version: 18

    - name: npm grab epg
      run: |
          npm install
          #npm run grab -- --channels=../sites/canalplus.com/canalplus.com_cm.channels.xml--maxConnections=20 --gzip --output=guides/novatv.is.xml --days=2 --timeout=90000
          #npm run channels:parse -- --config=./sites/orangetv.es/orangetv.es.config.js --output=./sites/orangetv.es/orangetv.es.channels.xml
          #npm run grab -- --site=orangetv.es --maxConnections=20 --gzip --output=guides/orangetv.es.xml --days=2 --timeout=90000
          npm run grab -- --site=stod2.is --maxConnections=20 --gzip --output=guides/stod2.is.xml --days=2 --timeout=90000
   
    - name: Commit changes
      run: |
        git config --local user.email "your-email@example.com"
        git config --local user.name "Your Name"
        #git add -f sites/canalplus.com/canalplus.com_test.channels.xml
        #git add -f guides/orangetv.es.xml
        git add -f guides/stod2.is.xml
        #git add -f sites/orangetv.es/orangetv.es.channels.xml
        git commit -m "Update xml"
        git push
