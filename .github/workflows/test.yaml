name: EPG Update

on:
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
           node-version: 18

    - name: npm grab epg
      run: |
          npm install
          #npm run grab -- --channels=../sites/canalplus.com/canalplus.com_cm.channels.xml--maxConnections=20 --gzip --output=guides/propg.net.xml --days=2 --timeout=90000
          npm run channels:parse -- --config=./sites/silktv.ge/silktv.ge.config.js --output=./sites/silktv.ge/silktv.ge.channels.xml
          #npm run channels:parse -- --config=./sites/tv.yandex.ru/tv.yandex.ru.config.js --output=./sites/tv.yandex.ru/tv.yandex.ru.channels.xml
          #npm run grab -- --site=tv.magenta.mk --maxConnections=20 --gzip --output=guides/tv.magenta.mk.xml --days=2 --timeout=90000
          #npm run grab -- --site=propg.net --maxConnections=20 --gzip --output=guides/propg.net.xml --days=2 --timeout=90000
          #npm run grab -- --site=yes.co.il --maxConnections=20 --gzip --output=guides/yes.co.il.xml --days=2 --timeout=90000
          #npm run grab -- --site=primetel.com.cy --maxConnections=20 --output=guides/primetel.com.cy.xml --days=1 --timeout=90000
   
    - name: Commit changes
      run: |
        git config --local user.email "your-email@example.com"
        git config --local user.name "Your Name"
        #git add -f sites/canalplus.com/canalplus.com_test.channels.xml
        #git add -f guides/tv.magenta.mk.xml
        #git add -f guides/propg.net.xml
        #git add -f guides/primetel.com.cy.xml
        git add -f sites/silktv.ge/silktv.ge.channels.xml
        git commit -m "Update xml"
        git push
